<!DOCTYPE html>
<html>
<head>
  <title>AI Chat</title>
</head>

<body>

<h1>AI Chat</h1>

<input id="message" placeholder="Напиши сообщение">
<button onclick="sendMessage()">Отправить</button>

<div id="chat"></div>

<script>
async function sendMessage() {
  const input = document.getElementById("message");
  const chat = document.getElementById("chat");

  const userMessage = input.value;

  if (!userMessage) return;

  chat.innerHTML += `<p><b>Ты:</b> ${userMessage}</p>`;

  input.value = "";

  chat.innerHTML += `<p><b>AI:</b> думает...</p>`;

  const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer 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"
    },
    body: JSON.stringify({
      model: "llama3-70b-8192",
      messages: [
        { role: "user", content: userMessage }
      ]
    })
  });

  const data = await response.json();
  const aiReply = data.choices[0].message.content;

  chat.innerHTML = chat.innerHTML.replace("думает...", aiReply);
}
</script>

</body>
</html>
