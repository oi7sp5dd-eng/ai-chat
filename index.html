<!DOCTYPE html>
<html>
<head>
  <title>AI Chat</title>
</head>

<body>

<h1>AI Chat</h1>

<input id="message" placeholder="Напиши сообщение">
<button onclick="sendMessage()">Отправить</button>

<div id="chat"></div>

<script>
async function sendMessage() {
  const input = document.getElementById("message");
  const chat = document.getElementById("chat");

  const userMessage = input.value;

  if (!userMessage) return;

  chat.innerHTML += `<p><b>Ты:</b> ${userMessage}</p>`;
  input.value = "";

  const aiMsgId = "ai-" + Date.now();
  chat.innerHTML += `<p id="${aiMsgId}"><b>AI:</b> думает...</p>`;

  try {
    const response = await fetch("https://ai-backend-4txk.onrender.com/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: userMessage
      })
    });

    const data = await response.json();

    console.log(data);

    let aiReply = "Ошибка ответа";

    if (data.choices && data.choices[0]) {
      aiReply = data.choices[0].message.content;
    } else if (data.error) {
      aiReply = "Ошибка: " + data.error.message;
    }

    document.getElementById(aiMsgId).innerHTML = `<b>AI:</b> ${aiReply}`;

  } catch (error) {
    console.error(error);
    document.getElementById(aiMsgId).innerHTML = `<b>AI:</b> Ошибка подключения`;
  }
}
</script>

</body>
</html>
